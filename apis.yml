aid: together-ai
url: https://raw.githubusercontent.com/api-evangelist/together-ai/refs/heads/main/apis.yml
name: Together AI
kind: company
description: Together AI is an AI acceleration cloud delivering fast, scalable, and
  reliable generative-AI infrastructure. The Together API serves open-source and proprietary
  foundation models for chat, embeddings, vision, audio, image and video generation,
  fine-tuning, code execution, and dedicated GPU compute.
