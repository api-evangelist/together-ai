naftiko: 1.0.0-alpha2
info:
  label: Together APIs — Rerank
  description: 'Together APIs — Rerank. 1 operations. Lead operation: Create a rerank request. Self-contained Naftiko capability
    covering one Together Ai business surface.'
  tags:
  - Together Ai
  - Rerank
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TOGETHER_AI_API_KEY: TOGETHER_AI_API_KEY
capability:
  consumes:
  - type: http
    namespace: together-ai-rerank
    baseUri: https://api.together.ai/v1
    description: Together APIs — Rerank business capability. Self-contained, no shared references.
    resources:
    - name: rerank
      path: /rerank
      operations:
      - name: rerank
        method: POST
        description: Create a rerank request
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.TOGETHER_AI_API_KEY}}'
  exposes:
  - type: rest
    namespace: together-ai-rerank-rest
    port: 8080
    description: REST adapter for Together APIs — Rerank. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/rerank
      name: rerank
      description: REST surface for rerank.
      operations:
      - method: POST
        name: rerank
        description: Create a rerank request
        call: together-ai-rerank.rerank
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: together-ai-rerank-mcp
    port: 9090
    transport: http
    description: MCP adapter for Together APIs — Rerank. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: create-rerank-request
      description: Create a rerank request
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: together-ai-rerank.rerank
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
