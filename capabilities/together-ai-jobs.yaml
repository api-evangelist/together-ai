naftiko: 1.0.0-alpha2
info:
  label: Together APIs — Jobs
  description: 'Together APIs — Jobs. 2 operations. Lead operation: List all jobs. Self-contained Naftiko capability covering
    one Together Ai business surface.'
  tags:
  - Together Ai
  - Jobs
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TOGETHER_AI_API_KEY: TOGETHER_AI_API_KEY
capability:
  consumes:
  - type: http
    namespace: together-ai-jobs
    baseUri: https://api.together.ai/v1
    description: Together APIs — Jobs business capability. Self-contained, no shared references.
    resources:
    - name: jobs
      path: /jobs
      operations:
      - name: listjobs
        method: GET
        description: List all jobs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: jobs-jobId
      path: /jobs/{jobId}
      operations:
      - name: getjob
        method: GET
        description: Get job status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: jobId
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.TOGETHER_AI_API_KEY}}'
  exposes:
  - type: rest
    namespace: together-ai-jobs-rest
    port: 8080
    description: REST adapter for Together APIs — Jobs. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/jobs
      name: jobs
      description: REST surface for jobs.
      operations:
      - method: GET
        name: listjobs
        description: List all jobs
        call: together-ai-jobs.listjobs
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/jobs/{jobid}
      name: jobs-jobid
      description: REST surface for jobs-jobId.
      operations:
      - method: GET
        name: getjob
        description: Get job status
        call: together-ai-jobs.getjob
        with:
          jobId: rest.jobId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: together-ai-jobs-mcp
    port: 9090
    transport: http
    description: MCP adapter for Together APIs — Jobs. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-all-jobs
      description: List all jobs
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: together-ai-jobs.listjobs
      outputParameters:
      - type: object
        mapping: $.
    - name: get-job-status
      description: Get job status
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: together-ai-jobs.getjob
      with:
        jobId: tools.jobId
      outputParameters:
      - type: object
        mapping: $.
