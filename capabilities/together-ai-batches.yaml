    resources:
    - path: /v1/batches
      name: batches
      description: REST surface for batches.
      operations:
      - method: GET
        name: get
        description: List batch jobs
        call: together-ai-batches.get
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: post
        description: Create a batch job
        call: together-ai-batches.post
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/batches/{id}
