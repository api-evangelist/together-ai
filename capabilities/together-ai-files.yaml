naftiko: 1.0.0-alpha2
info:
  label: Together APIs — Files
  description: 'Together APIs — Files. 5 operations. Lead operation: List all files. Self-contained Naftiko capability covering
    one Together Ai business surface.'
  tags:
  - Together Ai
  - Files
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TOGETHER_AI_API_KEY: TOGETHER_AI_API_KEY
capability:
  consumes:
  - type: http
    namespace: together-ai-files
    baseUri: https://api.together.ai/v1
    description: Together APIs — Files business capability. Self-contained, no shared references.
    resources:
    - name: files
      path: /files
      operations:
      - name: get
        method: GET
        description: List all files
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: files-upload
      path: /files/upload
      operations:
      - name: post
        method: POST
        description: Upload a file
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: files-id
      path: /files/{id}
      operations:
      - name: get
        method: GET
        description: Retrieve file metadata
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
      - name: delete
        method: DELETE
        description: Delete a file
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
    - name: files-id-content
      path: /files/{id}/content
      operations:
      - name: get
        method: GET
        description: Get file contents
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.TOGETHER_AI_API_KEY}}'
  exposes:
  - type: rest
    namespace: together-ai-files-rest
    port: 8080
    description: REST adapter for Together APIs — Files. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/files
      name: files
      description: REST surface for files.
      operations:
      - method: GET
        name: get
        description: List all files
        call: together-ai-files.get
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/files/upload
      name: files-upload
      description: REST surface for files-upload.
      operations:
      - method: POST
        name: post
        description: Upload a file
        call: together-ai-files.post
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/files/{id}
      name: files-id
      description: REST surface for files-id.
      operations:
      - method: GET
        name: get
        description: Retrieve file metadata
        call: together-ai-files.get
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: delete
        description: Delete a file
        call: together-ai-files.delete
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/files/{id}/content
      name: files-id-content
      description: REST surface for files-id-content.
      operations:
      - method: GET
        name: get
        description: Get file contents
        call: together-ai-files.get
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: together-ai-files-mcp
    port: 9090
    transport: http
    description: MCP adapter for Together APIs — Files. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-all-files
      description: List all files
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: together-ai-files.get
      outputParameters:
      - type: object
        mapping: $.
    - name: upload-file
      description: Upload a file
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: together-ai-files.post
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-file-metadata
      description: Retrieve file metadata
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: together-ai-files.get
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-file
      description: Delete a file
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: together-ai-files.delete
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: get-file-contents
      description: Get file contents
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: together-ai-files.get
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
