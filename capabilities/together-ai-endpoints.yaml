naftiko: 1.0.0-alpha2
info:
  label: Together APIs — Endpoints
  description: 'Together APIs — Endpoints. 5 operations. Lead operation: List all endpoints, can be filtered by type. Self-contained
    Naftiko capability covering one Together Ai business surface.'
  tags:
  - Together Ai
  - Endpoints
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TOGETHER_AI_API_KEY: TOGETHER_AI_API_KEY
capability:
  consumes:
  - type: http
    namespace: together-ai-endpoints
    baseUri: https://api.together.ai/v1
    description: Together APIs — Endpoints business capability. Self-contained, no shared references.
    resources:
    - name: endpoints
      path: /endpoints
      operations:
      - name: listendpoints
        method: GET
        description: List all endpoints, can be filtered by type
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: type
          in: query
          type: string
        - name: usage_type
          in: query
          type: string
        - name: mine
          in: query
          type: boolean
      - name: createendpoint
        method: POST
        description: Create a dedicated endpoint, it will start automatically
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: endpoints-endpointId
      path: /endpoints/{endpointId}
      operations:
      - name: getendpoint
        method: GET
        description: Get endpoint by ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: endpointId
          in: path
          type: string
          required: true
      - name: updateendpoint
        method: PATCH
        description: Update endpoint, this can also be used to start or stop a dedicated endpoint
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: endpointId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteendpoint
        method: DELETE
        description: Delete endpoint
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: endpointId
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.TOGETHER_AI_API_KEY}}'
  exposes:
  - type: rest
    namespace: together-ai-endpoints-rest
    port: 8080
    description: REST adapter for Together APIs — Endpoints. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/endpoints
      name: endpoints
      description: REST surface for endpoints.
      operations:
      - method: GET
        name: listendpoints
        description: List all endpoints, can be filtered by type
        call: together-ai-endpoints.listendpoints
        with:
          type: rest.type
          usage_type: rest.usage_type
          mine: rest.mine
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createendpoint
        description: Create a dedicated endpoint, it will start automatically
        call: together-ai-endpoints.createendpoint
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/endpoints/{endpointid}
      name: endpoints-endpointid
      description: REST surface for endpoints-endpointId.
      operations:
      - method: GET
        name: getendpoint
        description: Get endpoint by ID
        call: together-ai-endpoints.getendpoint
        with:
          endpointId: rest.endpointId
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updateendpoint
        description: Update endpoint, this can also be used to start or stop a dedicated endpoint
        call: together-ai-endpoints.updateendpoint
        with:
          endpointId: rest.endpointId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteendpoint
        description: Delete endpoint
        call: together-ai-endpoints.deleteendpoint
        with:
          endpointId: rest.endpointId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: together-ai-endpoints-mcp
    port: 9090
    transport: http
    description: MCP adapter for Together APIs — Endpoints. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-all-endpoints-can-be
      description: List all endpoints, can be filtered by type
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: together-ai-endpoints.listendpoints
      with:
        type: tools.type
        usage_type: tools.usage_type
        mine: tools.mine
      outputParameters:
      - type: object
        mapping: $.
    - name: create-dedicated-endpoint-it-will
      description: Create a dedicated endpoint, it will start automatically
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: together-ai-endpoints.createendpoint
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-endpoint-id
      description: Get endpoint by ID
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: together-ai-endpoints.getendpoint
      with:
        endpointId: tools.endpointId
      outputParameters:
      - type: object
        mapping: $.
    - name: update-endpoint-this-can-also
      description: Update endpoint, this can also be used to start or stop a dedicated endpoint
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: together-ai-endpoints.updateendpoint
      with:
        endpointId: tools.endpointId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-endpoint
      description: Delete endpoint
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: together-ai-endpoints.deleteendpoint
      with:
        endpointId: tools.endpointId
      outputParameters:
      - type: object
        mapping: $.
