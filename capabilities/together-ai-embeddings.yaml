naftiko: 1.0.0-alpha2
info:
  label: Together APIs — Embeddings
  description: 'Together APIs — Embeddings. 1 operations. Lead operation: Create embedding. Self-contained Naftiko capability
    covering one Together Ai business surface.'
  tags:
  - Together Ai
  - Embeddings
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TOGETHER_AI_API_KEY: TOGETHER_AI_API_KEY
capability:
  consumes:
  - type: http
    namespace: together-ai-embeddings
    baseUri: https://api.together.ai/v1
    description: Together APIs — Embeddings business capability. Self-contained, no shared references.
    resources:
    - name: embeddings
      path: /embeddings
      operations:
      - name: embeddings
        method: POST
        description: Create embedding
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.TOGETHER_AI_API_KEY}}'
  exposes:
  - type: rest
    namespace: together-ai-embeddings-rest
    port: 8080
    description: REST adapter for Together APIs — Embeddings. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/embeddings
      name: embeddings
      description: REST surface for embeddings.
      operations:
      - method: POST
        name: embeddings
        description: Create embedding
        call: together-ai-embeddings.embeddings
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: together-ai-embeddings-mcp
    port: 9090
    transport: http
    description: MCP adapter for Together APIs — Embeddings. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: create-embedding
      description: Create embedding
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: together-ai-embeddings.embeddings
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
