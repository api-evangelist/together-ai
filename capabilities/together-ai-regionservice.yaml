naftiko: 1.0.0-alpha2
info:
  label: Together APIs — RegionService
  description: 'Together APIs — RegionService. 1 operations. Lead operation: List regions and corresponding supported driver
    versions. Self-contained Naftiko capability covering one Together Ai business surface.'
  tags:
  - Together Ai
  - RegionService
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TOGETHER_AI_API_KEY: TOGETHER_AI_API_KEY
capability:
  consumes:
  - type: http
    namespace: together-ai-regionservice
    baseUri: https://api.together.ai/v1
    description: Together APIs — RegionService business capability. Self-contained, no shared references.
    resources:
    - name: compute-regions
      path: /compute/regions
      operations:
      - name: regionservicelist
        method: GET
        description: List regions and corresponding supported driver versions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.TOGETHER_AI_API_KEY}}'
  exposes:
  - type: rest
    namespace: together-ai-regionservice-rest
    port: 8080
    description: REST adapter for Together APIs — RegionService. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/compute/regions
      name: compute-regions
      description: REST surface for compute-regions.
      operations:
      - method: GET
        name: regionservicelist
        description: List regions and corresponding supported driver versions
        call: together-ai-regionservice.regionservicelist
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: together-ai-regionservice-mcp
    port: 9090
    transport: http
    description: MCP adapter for Together APIs — RegionService. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-regions-and-corresponding-supported
      description: List regions and corresponding supported driver versions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: together-ai-regionservice.regionservicelist
      outputParameters:
      - type: object
        mapping: $.
