naftiko: 1.0.0-alpha2
info:
  label: Together APIs — Queue
  description: 'Together APIs — Queue. 4 operations. Lead operation: Cancel a queued job. Self-contained Naftiko capability
    covering one Together Ai business surface.'
  tags:
  - Together Ai
  - Queue
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TOGETHER_AI_API_KEY: TOGETHER_AI_API_KEY
capability:
  consumes:
  - type: http
    namespace: together-ai-queue
    baseUri: https://api.together.ai/v1
    description: Together APIs — Queue business capability. Self-contained, no shared references.
    resources:
    - name: queue-cancel
      path: /queue/cancel
      operations:
      - name: cancelqueuejob
        method: POST
        description: Cancel a queued job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: queue-metrics
      path: /queue/metrics
      operations:
      - name: getqueuemetrics
        method: GET
        description: Get queue metrics
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: model
          in: query
          type: string
          required: true
    - name: queue-status
      path: /queue/status
      operations:
      - name: getqueuejobstatus
        method: GET
        description: Get job status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: request_id
          in: query
          type: string
          required: true
        - name: model
          in: query
          type: string
          required: true
    - name: queue-submit
      path: /queue/submit
      operations:
      - name: submitqueuejob
        method: POST
        description: Submit a queued job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.TOGETHER_AI_API_KEY}}'
  exposes:
  - type: rest
    namespace: together-ai-queue-rest
    port: 8080
    description: REST adapter for Together APIs — Queue. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/queue/cancel
      name: queue-cancel
      description: REST surface for queue-cancel.
      operations:
      - method: POST
        name: cancelqueuejob
        description: Cancel a queued job
        call: together-ai-queue.cancelqueuejob
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/queue/metrics
      name: queue-metrics
      description: REST surface for queue-metrics.
      operations:
      - method: GET
        name: getqueuemetrics
        description: Get queue metrics
        call: together-ai-queue.getqueuemetrics
        with:
          model: rest.model
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/queue/status
      name: queue-status
      description: REST surface for queue-status.
      operations:
      - method: GET
        name: getqueuejobstatus
        description: Get job status
        call: together-ai-queue.getqueuejobstatus
        with:
          request_id: rest.request_id
          model: rest.model
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/queue/submit
      name: queue-submit
      description: REST surface for queue-submit.
      operations:
      - method: POST
        name: submitqueuejob
        description: Submit a queued job
        call: together-ai-queue.submitqueuejob
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: together-ai-queue-mcp
    port: 9090
    transport: http
    description: MCP adapter for Together APIs — Queue. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: cancel-queued-job
      description: Cancel a queued job
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: together-ai-queue.cancelqueuejob
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-queue-metrics
      description: Get queue metrics
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: together-ai-queue.getqueuemetrics
      with:
        model: tools.model
      outputParameters:
      - type: object
        mapping: $.
    - name: get-job-status
      description: Get job status
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: together-ai-queue.getqueuejobstatus
      with:
        request_id: tools.request_id
        model: tools.model
      outputParameters:
      - type: object
        mapping: $.
    - name: submit-queued-job
      description: Submit a queued job
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: together-ai-queue.submitqueuejob
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
