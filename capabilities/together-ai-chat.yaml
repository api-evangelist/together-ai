naftiko: 1.0.0-alpha2
info:
  label: Together APIs — Chat
  description: 'Together APIs — Chat. 1 operations. Lead operation: Create chat completion. Self-contained Naftiko capability
    covering one Together Ai business surface.'
  tags:
  - Together Ai
  - Chat
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TOGETHER_AI_API_KEY: TOGETHER_AI_API_KEY
capability:
  consumes:
  - type: http
    namespace: together-ai-chat
    baseUri: https://api.together.ai/v1
    description: Together APIs — Chat business capability. Self-contained, no shared references.
    resources:
    - name: chat-completions
      path: /chat/completions
      operations:
      - name: chatcompletions
        method: POST
        description: Create chat completion
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.TOGETHER_AI_API_KEY}}'
  exposes:
  - type: rest
    namespace: together-ai-chat-rest
    port: 8080
    description: REST adapter for Together APIs — Chat. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/chat/completions
      name: chat-completions
      description: REST surface for chat-completions.
      operations:
      - method: POST
        name: chatcompletions
        description: Create chat completion
        call: together-ai-chat.chatcompletions
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: together-ai-chat-mcp
    port: 9090
    transport: http
    description: MCP adapter for Together APIs — Chat. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: create-chat-completion
      description: Create chat completion
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: together-ai-chat.chatcompletions
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
