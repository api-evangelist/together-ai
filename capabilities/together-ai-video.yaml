naftiko: 1.0.0-alpha2
info:
  label: Together APIs — Video
  description: 'Together APIs — Video. 2 operations. Lead operation: Create video. Self-contained Naftiko capability covering
    one Together Ai business surface.'
  tags:
  - Together Ai
  - Video
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TOGETHER_AI_API_KEY: TOGETHER_AI_API_KEY
capability:
  consumes:
  - type: http
    namespace: together-ai-video
    baseUri: https://api.together.ai/v1
    description: Together APIs — Video business capability. Self-contained, no shared references.
    resources:
    - name: videos
      path: /videos
      operations:
      - name: createvideo
        method: POST
        description: Create video
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: videos-id
      path: /videos/{id}
      operations:
      - name: retrievevideo
        method: GET
        description: Fetch video metadata
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.TOGETHER_AI_API_KEY}}'
  exposes:
  - type: rest
    namespace: together-ai-video-rest
    port: 8080
    description: REST adapter for Together APIs — Video. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/videos
      name: videos
      description: REST surface for videos.
      operations:
      - method: POST
        name: createvideo
        description: Create video
        call: together-ai-video.createvideo
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/videos/{id}
      name: videos-id
      description: REST surface for videos-id.
      operations:
      - method: GET
        name: retrievevideo
        description: Fetch video metadata
        call: together-ai-video.retrievevideo
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: together-ai-video-mcp
    port: 9090
    transport: http
    description: MCP adapter for Together APIs — Video. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: create-video
      description: Create video
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: together-ai-video.createvideo
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: fetch-video-metadata
      description: Fetch video metadata
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: together-ai-video.retrievevideo
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
