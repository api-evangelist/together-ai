naftiko: 1.0.0-alpha2
info:
  label: Together APIs — endpoints
  description: 'Together APIs — endpoints. 1 operations. Lead operation: List all available availability zones.. Self-contained
    Naftiko capability covering one Together Ai business surface.'
  tags:
  - Together Ai
  - endpoints
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TOGETHER_AI_API_KEY: TOGETHER_AI_API_KEY
capability:
  consumes:
  - type: http
    namespace: together-ai-endpoints-2
    baseUri: https://api.together.ai/v1
    description: Together APIs — endpoints business capability. Self-contained, no shared references.
    resources:
    - name: clusters-availability-zones
      path: /clusters/availability-zones
      operations:
      - name: availabilityzones
        method: GET
        description: List all available availability zones.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.TOGETHER_AI_API_KEY}}'
  exposes:
  - type: rest
    namespace: together-ai-endpoints-2-rest
    port: 8080
    description: REST adapter for Together APIs — endpoints. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/clusters/availability-zones
      name: clusters-availability-zones
      description: REST surface for clusters-availability-zones.
      operations:
      - method: GET
        name: availabilityzones
        description: List all available availability zones.
        call: together-ai-endpoints-2.availabilityzones
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: together-ai-endpoints-2-mcp
    port: 9090
    transport: http
    description: MCP adapter for Together APIs — endpoints. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-all-available-availability-zones
      description: List all available availability zones.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: together-ai-endpoints-2.availabilityzones
      outputParameters:
      - type: object
        mapping: $.
