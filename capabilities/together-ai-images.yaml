naftiko: 1.0.0-alpha2
info:
  label: Together APIs — Images
  description: 'Together APIs — Images. 1 operations. Lead operation: Create image. Self-contained Naftiko capability covering
    one Together Ai business surface.'
  tags:
  - Together Ai
  - Images
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TOGETHER_AI_API_KEY: TOGETHER_AI_API_KEY
capability:
  consumes:
  - type: http
    namespace: together-ai-images
    baseUri: https://api.together.ai/v1
    description: Together APIs — Images business capability. Self-contained, no shared references.
    resources:
    - name: images-generations
      path: /images/generations
      operations:
      - name: post
        method: POST
        description: Create image
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.TOGETHER_AI_API_KEY}}'
  exposes:
  - type: rest
    namespace: together-ai-images-rest
    port: 8080
    description: REST adapter for Together APIs — Images. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/images/generations
      name: images-generations
      description: REST surface for images-generations.
      operations:
      - method: POST
        name: post
        description: Create image
        call: together-ai-images.post
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: together-ai-images-mcp
    port: 9090
    transport: http
    description: MCP adapter for Together APIs — Images. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: create-image
      description: Create image
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: together-ai-images.post
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
