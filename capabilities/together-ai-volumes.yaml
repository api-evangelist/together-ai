naftiko: 1.0.0-alpha2
info:
  label: Together APIs — Volumes
  description: 'Together APIs — Volumes. 3 operations. Lead operation: Delete a volume. Self-contained Naftiko capability
    covering one Together Ai business surface.'
  tags:
  - Together Ai
  - Volumes
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TOGETHER_AI_API_KEY: TOGETHER_AI_API_KEY
capability:
  consumes:
  - type: http
    namespace: together-ai-volumes
    baseUri: https://api.together.ai/v1
    description: Together APIs — Volumes business capability. Self-contained, no shared references.
    resources:
    - name: deployments-storage-volumes-id
      path: /deployments/storage/volumes/{id}
      operations:
      - name: delete
        method: DELETE
        description: Delete a volume
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
      - name: get
        method: GET
        description: Get a volume by ID or name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
      - name: patch
        method: PATCH
        description: Update a volume
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.TOGETHER_AI_API_KEY}}'
  exposes:
  - type: rest
    namespace: together-ai-volumes-rest
    port: 8080
    description: REST adapter for Together APIs — Volumes. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/deployments/storage/volumes/{id}
      name: deployments-storage-volumes-id
      description: REST surface for deployments-storage-volumes-id.
      operations:
      - method: DELETE
        name: delete
        description: Delete a volume
        call: together-ai-volumes.delete
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: get
        description: Get a volume by ID or name
        call: together-ai-volumes.get
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: patch
        description: Update a volume
        call: together-ai-volumes.patch
        with:
          id: rest.id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: together-ai-volumes-mcp
    port: 9090
    transport: http
    description: MCP adapter for Together APIs — Volumes. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: delete-volume
      description: Delete a volume
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: together-ai-volumes.delete
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: get-volume-id-name
      description: Get a volume by ID or name
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: together-ai-volumes.get
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: update-volume
      description: Update a volume
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: together-ai-volumes.patch
      with:
        id: tools.id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
